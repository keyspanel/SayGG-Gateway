<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
    <title>PayGateway</title>
    <!-- Pre-connect to the Google Fonts hosts so the Inter / Plus Jakarta Sans
         CSS + woff2 files start downloading on the very first paint. This
         removes the brief FOUT that would otherwise be visible on the
         "Payment received" headline and on the canvas-rendered QR card. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gw_theme');
          if (t !== 'dark' && t !== 'light') t = 'light';
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.colorScheme = t;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <style>
      html, body, #root {
        margin: 0; padding: 0; min-height: 100%;
        background: #fafafa;
        color: #0a0a0f;
        font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      html[data-theme="dark"], html[data-theme="dark"] body, html[data-theme="dark"] #root {
        background: #0b0b0f;
        color: #f4f4f5;
      }
      .gw-boot {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      .gw-boot::after {
        content: ''; width: 26px; height: 26px;
        border: 2px solid rgba(0,0,0,0.08); border-top-color: #4f46e5;
        border-radius: 50%; animation: gw-spin .8s linear infinite;
      }
      html[data-theme="dark"] .gw-boot::after {
        border-color: rgba(255,255,255,0.08); border-top-color: #818cf8;
      }
      @keyframes gw-spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="/assets/index-AxlUOpfd.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bzc_Dlgp.css">
  </head>
  <body>
    <div id="root"><div class="gw-boot"></div></div>
  </body>
</html>
